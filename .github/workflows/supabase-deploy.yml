name: Supabase Deploy

on:
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_PROJECT_REF: mligzafrdckazvagqeht
      SUPABASE_FUNCTION_NAME: make-server-f118884a
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Push database migrations
        run: supabase db push

      - name: Deploy edge function
        run: supabase functions deploy "$SUPABASE_FUNCTION_NAME" --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
